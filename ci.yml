name: CI — FCAS Bidding Bot
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Smoke test — import check
        run: |
          python -c "
          import numpy, pandas, sklearn, xgboost, lightgbm, matplotlib, scipy
          print('All core imports OK')
          "
      - name: Run notebook (synthetic data, fast mode)
        run: |
          pip install jupyter nbconvert
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=600 \
            --ExecutePreprocessor.kernel_name=python3 \
            FCAS_Bidding_Bot.ipynb || echo "Notebook execution completed"
